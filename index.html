<meta charset="UTF-8"/>

<title>Health Achievements</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d12;--bg2:#13131a;--bg3:#1a1a24;--card:#181822;--card-hover:#1e1e2c;
  --border:#252535;--border2:#353550;--text:#e2e2ef;--text2:#8888a8;--text3:#4a4a68;
  --bronze:#CD7F32;--bronze-bg:rgba(205,127,50,.13);--bronze-t:#f0a040;
  --silver:#a8aaaf;--silver-bg:rgba(168,170,175,.12);--silver-t:#ccced4;
  --gold:#D4AF37;--gold-bg:rgba(212,175,55,.13);--gold-t:#f0d060;
  --platinum:#9b7bff;--platinum-bg:rgba(155,123,255,.13);--platinum-t:#c4aaff;
  --accent:#5b6af0;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.app-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:1rem;flex-wrap:wrap}
.logo{font-size:17px;font-weight:700;letter-spacing:-.3px;white-space:nowrap}
.logo span{color:var(--accent)}
.header-stats{display:flex;gap:1.5rem;flex-shrink:0}
.hstat{text-align:center}
.hstat-num{font-size:22px;font-weight:700;color:var(--text);line-height:1}
.hstat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-top:2px}
.progress-section{background:var(--bg2);border-bottom:1px solid var(--border);padding:.6rem 2rem}
.pbar-row{display:flex;align-items:center;gap:1rem}
.pbar-wrap{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--platinum-t));border-radius:3px;transition:width .6s ease}
.pbar-label{font-size:12px;color:var(--text3);white-space:nowrap}
.tier-summary{background:var(--bg2);border-bottom:1px solid var(--border);padding:.7rem 2rem;display:flex;gap:1.5rem;flex-wrap:wrap}
.tsum{display:flex;align-items:center;gap:7px;font-size:12px}
.tsum-dot{width:8px;height:8px;border-radius:50%}
.tsum-num{font-weight:600;color:var(--text)}
.tsum-label{color:var(--text3)}
.main{max-width:1160px;margin:0 auto;padding:1.5rem 2rem}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit;display:flex;align-items:center;gap:5px}
.tab:hover{border-color:var(--border2);color:var(--text)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab .cnt{font-size:11px;opacity:.7;background:rgba(255,255,255,.15);padding:1px 5px;border-radius:8px}
.controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem}
.ctrl-label{font-size:13px;color:var(--text3)}
.ctrl-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.sort-btn{padding:5px 11px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
.sort-btn:hover,.sort-btn.active{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.reset-btn{padding:5px 11px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:12px;color:var(--text3);cursor:pointer;font-family:inherit;transition:all .15s}
.reset-btn:hover{border-color:#e24b4a66;color:#e24b4a}
.sec-hdr{font-size:11px;text-transform:uppercase;letter-spacing:.9px;color:var(--text3);margin:1.75rem 0 .9rem;font-weight:600;display:flex;align-items:center;gap:10px}
.sec-hdr::after{content:'';flex:1;height:1px;background:var(--border)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:9px}
.card:hover{background:var(--card-hover);border-color:var(--border2);transform:translateY(-2px)}
.card.locked{opacity:.52}
.tier-line{position:absolute;top:0;left:0;right:0;height:2.5px}
.t-bronze .tier-line{background:var(--bronze)}
.t-silver .tier-line{background:var(--silver)}
.t-gold .tier-line{background:var(--gold)}
.t-platinum .tier-line{background:linear-gradient(90deg,#9b7bff,#e040fb,#9b7bff)}
.t-bronze.unlocked{box-shadow:0 0 0 1px rgba(205,127,50,.25),0 4px 20px rgba(205,127,50,.07)}
.t-silver.unlocked{box-shadow:0 0 0 1px rgba(168,170,175,.22),0 4px 16px rgba(168,170,175,.06)}
.t-gold.unlocked{box-shadow:0 0 0 1px rgba(212,175,55,.3),0 4px 20px rgba(212,175,55,.09)}
.t-platinum.unlocked{box-shadow:0 0 0 1px rgba(155,123,255,.35),0 4px 22px rgba(155,123,255,.12)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.icon-box{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.t-bronze .icon-box{background:var(--bronze-bg)}
.t-silver .icon-box{background:var(--silver-bg)}
.t-gold .icon-box{background:var(--gold-bg)}
.t-platinum .icon-box{background:var(--platinum-bg)}
.right-top{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.tier-pill{font-size:9px;font-weight:700;padding:3px 7px;border-radius:9px;letter-spacing:.4px;text-transform:uppercase}
.t-bronze .tier-pill{background:var(--bronze-bg);color:var(--bronze-t)}
.t-silver .tier-pill{background:var(--silver-bg);color:var(--silver-t)}
.t-gold .tier-pill{background:var(--gold-bg);color:var(--gold-t)}
.t-platinum .tier-pill{background:var(--platinum-bg);color:var(--platinum-t)}
.check{font-size:14px;color:#4ade80;opacity:0;transition:opacity .2s}
.card.unlocked .check{opacity:1}
.card-name{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.35}
.card-desc{font-size:11.5px;color:var(--text2);line-height:1.5;flex:1}
.card-footer{display:flex;align-items:flex-end;justify-content:space-between;gap:6px;margin-top:2px}
.cat-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)}
.status-done{font-size:10.5px;color:#4ade80;font-weight:500}
.status-todo{font-size:10.5px;color:var(--text3)}
.unlock-date{font-size:9px;color:var(--text3);text-align:right}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:11px 22px;font-size:13px;color:var(--text);opacity:0;transition:all .3s ease;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>

</main>

const CAT_LABELS={sen:"Sen",cardio:"Cardio",zywienie:"Żywienie",suplementy:"Suplementy",nawodnienie:"Nawodnienie"};
const CAT_ICONS={sen:"🌙",cardio:"🏃",zywienie:"🥗",suplementy:"💊",nawodnienie:"💧"};
const TIER_LABELS={bronze:"Brąz",silver:"Srebro",gold:"Złoto",platinum:"Platyna"};
const TIER_ORDER={bronze:0,silver:1,gold:2,platinum:3};
const CATS=["sen","cardio","zywienie","suplementy","nawodnienie"];
const TIER_COUNTS={bronze:30,silver:35,gold:22,platinum:13};

let unlocked={},currentCat="all",currentSort="default";

function save(){try{localStorage.setItem("ha3_state",JSON.stringify(unlocked));}catch(e){}}
function load(){try{const d=localStorage.getItem("ha3_state");if(d)unlocked=JSON.parse(d);}catch(e){}}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2400);
}

function getFiltered(){
  let list=currentCat==="all"?[...A]:A.filter(a=>a.cat===currentCat);
  if(currentSort==="tier") list=[...list].sort((a,b)=>TIER_ORDER[b.tier]-TIER_ORDER[a.tier]);
  if(currentSort==="unlocked") list=[...list].sort((a,b)=>(unlocked[b.id]?1:0)-(unlocked[a.id]?1:0));
  return list;
}

function updateHeader(){
  const u=A.filter(a=>unlocked[a.id]).length;
  const tot=A.length;
  document.getElementById("h-unlocked").textContent=u;
  document.getElementById("h-pct").textContent=Math.round(u/tot*100)+"%";
  document.getElementById("pbar").style.width=(u/tot*100)+"%";
  document.getElementById("pbar-label").textContent=u+" / "+tot;
  ["bronze","silver","gold","platinum"].forEach(t=>{
    document.getElementById("ts-"+t[0]).textContent=A.filter(a=>a.tier===t&&unlocked[a.id]).length;
  });
}

function updateTabs(){
  document.querySelectorAll(".tab").forEach(tab=>{
    const cat=tab.dataset.cat;
    const items=cat==="all"?A:A.filter(a=>a.cat===cat);
    const u=items.filter(a=>unlocked[a.id]).length;
    const cnt=tab.querySelector(".cnt");
    if(cnt)cnt.textContent=u+"/"+items.length;
    tab.classList.toggle("active",cat===currentCat);
  });
}

function buildCard(a){
  const isU=!!unlocked[a.id];
  const card=document.createElement("div");
  card.className=`card t-${a.tier} ${isU?"unlocked":"locked"}`;
  const dateStr=unlocked[a.id]?new Date(unlocked[a.id]).toLocaleDateString("pl-PL"):"";
  card.innerHTML=`<div class="tier-line"></div>
<div class="card-top">
  <div class="icon-box">${ICONS[a.icon]||ICONS.star}</div>
  <div class="right-top"><span class="tier-pill">${TIER_LABELS[a.tier]}</span><span class="check">✓</span></div>
</div>
<div class="card-name">${isU?"":'<span style="opacity:.35;margin-right:3px">🔒</span>'}${a.name}</div>
<div class="card-desc">${a.desc}</div>
<div class="card-footer">
  <span class="cat-label">${CAT_ICONS[a.cat]} ${CAT_LABELS[a.cat]}</span>
  <div>${isU?`<div class="status-done">✓ Zrobione</div><div class="unlock-date">${dateStr}</div>`:`<div class="status-todo">Nieukończone</div>`}</div>
</div>`;
  card.onclick=()=>{
    if(unlocked[a.id]){delete unlocked[a.id];showToast("🔒 Zablokowano: "+a.name);}
    else{unlocked[a.id]=Date.now();showToast("🏆 Odblokowano: "+a.name+"!");}
    save();render();
  };
  return card;
}

function render(){
  const list=getFiltered();
  const u=list.filter(a=>unlocked[a.id]).length;
  document.getElementById("ctrl-label").textContent=`${u} z ${list.length} odblokowanych`;
  const container=document.getElementById("grid-container");
  container.innerHTML="";
  if(currentCat==="all"){
    CATS.forEach(cat=>{
      const items=list.filter(a=>a.cat===cat);
      if(!items.length)return;
      const sec=document.createElement("div");
      const hdr=document.createElement("div");hdr.className="sec-hdr";
      hdr.textContent=CAT_ICONS[cat]+" "+CAT_LABELS[cat];
      const grid=document.createElement("div");grid.className="grid";
      items.forEach(a=>grid.appendChild(buildCard(a)));
      sec.appendChild(hdr);sec.appendChild(grid);container.appendChild(sec);
    });
  } else {
    const grid=document.createElement("div");grid.className="grid";
    list.forEach(a=>grid.appendChild(buildCard(a)));
    container.appendChild(grid);
  }
  updateHeader();updateTabs();
}

document.getElementById("tabs").addEventListener("click",e=>{
  const tab=e.target.closest(".tab");if(!tab)return;
  currentCat=tab.dataset.cat;render();
});
document.querySelectorAll(".sort-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".sort-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");currentSort=btn.dataset.sort;render();
  });
});
document.getElementById("reset-btn").addEventListener("click",()=>{
  if(confirm("Na pewno zresetować cały postęp? Tej operacji nie można cofnąć.")){
    unlocked={};save();render();showToast("Zresetowano postęp");
  }
});

document.querySelectorAll(".tab").forEach(tab=>{
  const s=document.createElement("span");s.className="cnt";s.textContent="0/0";tab.appendChild(s);
});

load();render();
</script>
